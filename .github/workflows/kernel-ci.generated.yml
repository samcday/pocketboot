          path: target/ccache
          key: ${{ runner.os }}-kernel-ccache-source-qcom-msm8916-d87323486b79a31b9b25eb6fe30f1b503f142ff2-${{ hashFiles('.github/Dockerfile') }}-${{ github.run_id }}-${{ github.run_attempt }}
