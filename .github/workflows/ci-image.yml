name: CI Image

on:
  pull_request_target:
    types:
      - labeled
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci-image:
    name: Ensure CI image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check PR authorization
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.author_association != 'COLLABORATOR' &&
          github.event.pull_request.author_association != 'OWNER' &&
          !contains(github.event.pull_request.labels.*.name, 'ci-ok')
        run: |
          echo "This PR has not yet been marked as safe with a ci-ok label"
          exit 1

      - name: Checkout pocketboot
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Compute image ID
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          hash="$(sha256sum .github/Dockerfile | cut -d ' ' -f1)"
          image="ghcr.io/${owner}/pocketboot-ci:df-${hash}"
          {
            echo "hash=${hash}"
            echo "image=${image}"
            echo "short_hash=${hash::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check CI image
        id: image-status
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push CI image
        if: steps.image-status.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
