name: CI

on:
  pull_request:
    types:
      - labeled
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-image:
    name: Wait for CI image
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check PR authorization
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.author_association != 'COLLABORATOR' &&
          github.event.pull_request.author_association != 'OWNER' &&
          !contains(github.event.pull_request.labels.*.name, 'ci-ok')
        run: |
          echo "This PR has not yet been marked as safe with a ci-ok label"
          exit 1

      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Compute image ID
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          hash="$(sha256sum .github/Dockerfile | cut -d ' ' -f1)"
          image="ghcr.io/${owner}/pocketboot-ci:df-${hash}"
          {
            echo "hash=${hash}"
            echo "image=${image}"
            echo "short_hash=${hash::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for CI image
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          for attempt in $(seq 1 60); do
            if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
              echo "CI image is available: $IMAGE"
              exit 0
            fi

            echo "Waiting for CI image ($attempt/60): $IMAGE"
            sleep 60
          done

          echo "Timed out waiting for CI image: $IMAGE"
          echo "The CI Image workflow may still be running, or this PR may need a ci-ok label."
          exit 1

  generated-workflows:
    name: Generated workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci-image
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Check generated workflows
        run: cargo xtask ci-workflows --check

  kernel-ci:
    name: Kernel CI
    needs:
      - ci-image
      - generated-workflows
    uses: ./.github/workflows/kernel-ci.generated.yml
    with:
      image: ${{ needs.ci-image.outputs.image }}
    secrets: inherit
