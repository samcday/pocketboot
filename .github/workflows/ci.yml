name: CI

on:
  pull_request:
    types:
      - labeled
      - opened
      - reopened
      - synchronize
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-image:
    name: Wait for CI image
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check PR authorization
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.author_association != 'COLLABORATOR' &&
          github.event.pull_request.author_association != 'OWNER' &&
          !contains(github.event.pull_request.labels.*.name, 'ci-ok')
        run: |
          echo "This PR has not yet been marked as safe with a ci-ok label"
          exit 1

      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Compute image ID
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          hash="$(sha256sum .github/Dockerfile | cut -d ' ' -f1)"
          image="ghcr.io/${owner}/pocketboot-ci:df-${hash}"
          {
            echo "hash=${hash}"
            echo "image=${image}"
            echo "short_hash=${hash::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for CI image
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          for attempt in $(seq 1 60); do
            if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
              echo "CI image is available: $IMAGE"
              exit 0
            fi

            echo "Waiting for CI image ($attempt/60): $IMAGE"
            sleep 60
          done

          echo "Timed out waiting for CI image: $IMAGE"
          echo "The CI Image workflow may still be running, or this PR may need a ci-ok label."
          exit 1

  cpio:
    name: cpio
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci-image
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Cache Cargo downloads
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build initrd cpio
        run: cargo xtask cpio --output target/pocketboot-initrd.cpio

      - name: Upload initrd cpio
        uses: actions/upload-artifact@v4
        with:
          name: pocketboot-initrd-cpio
          path: target/pocketboot-initrd.cpio
          if-no-files-found: error

  kernel-matrix:
    name: Kernel matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci-image
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_builds: ${{ steps.matrix.outputs.has_builds }}
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Cache Cargo downloads
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Generate kernel matrix
        id: matrix
        run: |
          matrix="$(cargo xtask kernel-matrix)"
          has_builds="$(python3 -c 'import json, sys; print("true" if json.loads(sys.argv[1])["include"] else "false")' "$matrix")"
          echo "$matrix"
          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
            echo "has_builds=${has_builds}"
          } >> "$GITHUB_OUTPUT"

  kernel-bootimg:
    name: ${{ matrix.name }} kernels
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - ci-image
      - cpio
      - kernel-matrix
    if: needs.kernel-matrix.outputs.has_builds == 'true'
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.kernel-matrix.outputs.matrix) }}

    steps:
      - name: Checkout pocketboot
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Download initrd cpio
        uses: actions/download-artifact@v4
        with:
          name: pocketboot-initrd-cpio
          path: target

      - name: Cache Cargo downloads
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build kernels and boot images
        env:
          DEVICES: ${{ join(matrix.devices, ' ') }}
          BOOTIMG_DEVICES: ${{ join(matrix.bootimg_devices, ' ') }}
        run: |
          for device in $DEVICES; do
            cargo xtask kernel --initrd target/pocketboot-initrd.cpio "$device"
          done

          for device in $BOOTIMG_DEVICES; do
            cargo xtask bootimg "$device"
          done

      - name: Upload boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/kernel/**/boot.img
            target/kernel/**/.config
            target/kernel/**/arch/arm64/boot/Image.gz
            target/kernel/**/arch/arm64/boot/dts/**/*.dtb
          if-no-files-found: error
          include-hidden-files: true
