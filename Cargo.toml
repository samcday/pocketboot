[workspace]
members = [".", "xtask"]
resolver = "3"

[package]
name = "pocketboot"
version = "0.1.0"
edition = "2024"

[dependencies]
gadgetry-most-foul = { path = "../gadgetry-most-foul" }
libc = "0.2.177"
rustix = { version = "1", features = ["termios"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
panic = "abort"
strip = "symbols"
