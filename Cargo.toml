[workspace]
members = [".", "xtask"]
resolver = "3"

[package]
name = "pocketboot"
version = "0.1.0"
edition = "2024"

[dependencies]
abootimg-oxide = "0.5.1"
flate2 = "1"
gadgetry-most-foul = "0.1.1"
libc = "0.2.177"
rustix = { version = "1", features = ["termios"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "registry", "std"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
panic = "abort"
strip = "symbols"
