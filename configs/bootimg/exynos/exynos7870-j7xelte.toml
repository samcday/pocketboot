# Samsung Galaxy J7 (2016) legacy Samsung Android boot image packaging

header_version = 0
page_size = 2048
base = 0x10000000

# S-BOOT ignores these addresses for this target, but header v0 requires them.
kernel_offset = 0x00008000
ramdisk_offset = 0x01000000
second_offset = 0x00000000
tags_offset = 0x00000100
dtb_offset = 0x00000000

cmdline = ""

[dtbh]
entries = [
    { chip = 7870, hw_rev = 0, hw_rev_end = 255 },
]
