name = "Samsung Exynos 7870"

[kernel-source]
remote = "https://github.com/samcday/linux.git"
# https://github.com/samcday/linux/tree/pocketboot/exynos7870
sha = "124f59ceb29a9313306d54f1d1051daf4907e0a5"

[kconfig]
# Platform sizing
ARCH_EXYNOS = true
NR_CPUS = 8

# Core Samsung clocks, pinctrl, GPIO, PMU and reboot plumbing
COMMON_CLK_SAMSUNG = true
EXYNOS_ARM64_COMMON_CLK = true
PINCTRL_EXYNOS = true
SOC_SAMSUNG = true
EXYNOS_CHIPID = true
EXYNOS_PMU = true
CLKSRC_EXYNOS_MCT = true
MFD_SYSCON = true
POWER_RESET_SYSCON = true
POWER_RESET_SYSCON_POWEROFF = true
SYSCON_REBOOT_MODE = true

# UART and I2C buses
SERIAL_SAMSUNG = true
SERIAL_SAMSUNG_CONSOLE = true
I2C_EXYNOS5 = true
I2C_S3C2410 = true

# eMMC/SD storage
MMC_DW = true
MMC_DW_PLTFM = true
MMC_DW_EXYNOS = true

# USB DRD controller/PHY. Gadget functions belong in userland config.
GENERIC_PHY = true
PHY_EXYNOS5_USBDRD = true
USB_DWC3 = true
USB_DWC3_GADGET = true
USB_DWC3_EXYNOS = true
