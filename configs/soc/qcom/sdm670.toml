name = "Qualcomm SDM670"

[kconfig]
# Platform sizing
ARCH_QCOM = true
NR_CPUS = 8

# Core Qualcomm firmware/resource plumbing
QCOM_SCM = true
QCOM_COMMAND_DB = true
QCOM_RPMH = true
QCOM_RPMHPD = true
# QCOM_RPMHPD needs the OPP core for RPMh performance-state tables.
QCOM_CPR = true
QCOM_CLK_RPMH = true
QCOM_SMEM = true
QCOM_SOCINFO = true
HWSPINLOCK = true
HWSPINLOCK_QCOM = true
CPU_IDLE = true
ARM_PSCI_CPUIDLE = true
ARM_PSCI_CPUIDLE_DOMAIN = true

# Clocks, resets, pinctrl, GPIO and interrupts
COMMON_CLK_QCOM = true
SDM_GCC_845 = true
PINCTRL_MSM = true
PINCTRL_SDM670 = true
PINCTRL_QCOM_SPMI_PMIC = true
QCOM_PDC = true

# PMIC/regulator access
SPMI = true
SPMI_MSM_PMIC_ARB = true
MFD_SPMI_PMIC = true
REGULATOR = true
REGULATOR_FIXED_VOLTAGE = true
REGULATOR_QCOM_RPMH = true
POWER_RESET_QCOM_PON = true

# Interconnects and IOMMU required by on-SoC bus/storage devices
INTERCONNECT = true
INTERCONNECT_QCOM = true
INTERCONNECT_QCOM_SDM670 = true
IOMMU_SUPPORT = true
ARM_SMMU = true

# GENI UART/I2C buses used by sargo console and board peripherals
SERIAL_QCOM_GENI = true
SERIAL_QCOM_GENI_CONSOLE = true
QCOM_GENI_SE = true
I2C_QCOM_GENI = true
DMADEVICES = true
QCOM_GPI_DMA = true

# eMMC storage
MMC_SDHCI = true
MMC_SDHCI_PLTFM = true
MMC_SDHCI_MSM = true

# USB peripheral controller and HS PHY. Gadget functions belong in userland config.
NVMEM = true
NVMEM_QCOM_QFPROM = true
GENERIC_PHY = true
PHY_QCOM_QUSB2 = true
USB_SUPPORT = true
USB_DWC3 = true
USB_DWC3_GADGET = true
USB_DWC3_QCOM = true
