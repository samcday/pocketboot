name = "Qualcomm SDM845"

[kernel-source]
remote = "https://github.com/samcday/linux.git"
# https://github.com/samcday/linux/tree/pocketboot/sdm845
sha = "9b15544461aecf5d09f192cd2c31147d3c7d0940"

[kconfig]
# Platform sizing
ARCH_QCOM = true
NR_CPUS = 8

# Core Qualcomm firmware/resource plumbing
QCOM_SCM = true
QCOM_COMMAND_DB = true
QCOM_RPMH = true
QCOM_CLK_RPMH = true
QCOM_RPMHPD = true
QCOM_SMEM = true
QCOM_SOCINFO = true
HWSPINLOCK = true
HWSPINLOCK_QCOM = true
CPU_IDLE = true
ARM_PSCI_CPUIDLE = true
ARM_PSCI_CPUIDLE_DOMAIN = true
MAILBOX = true
QCOM_APCS_IPC = true
QCOM_PDC = true
QCOM_GENI_SE = true
INTERCONNECT = true
INTERCONNECT_QCOM = true
INTERCONNECT_QCOM_SDM845 = true
INTERCONNECT_QCOM_OSM_L3 = true

# Clocks, resets, pinctrl, GPIO, PMIC access and nvmem calibration
COMMON_CLK_QCOM = true
SDM_GCC_845 = true
PINCTRL_MSM = true
PINCTRL_SDM845 = true
SPMI = true
SPMI_MSM_PMIC_ARB = true
MFD_SPMI_PMIC = true
PINCTRL_QCOM_SPMI_PMIC = true
REGULATOR = true
REGULATOR_QCOM_RPMH = true
POWER_RESET_MSM = true
POWER_RESET_QCOM_PON = true
NVMEM = true
NVMEM_QCOM_QFPROM = true

# IOMMU for UFS, USB and GENI DMA clients
IOMMU_SUPPORT = true
ARM_SMMU = true
ARM_SMMU_QCOM = true

# GENI UART/I2C/SPI buses
SERIAL_QCOM_GENI = true
SERIAL_QCOM_GENI_CONSOLE = true
I2C_QCOM_GENI = true
SPI_QCOM_GENI = true
DMADEVICES = true
QCOM_GPI_DMA = true

# UFS storage
SCSI = true
BLK_DEV_SD = true
SCSI_UFSHCD = true
SCSI_UFSHCD_PLATFORM = true
SCSI_UFS_QCOM = true
GENERIC_PHY = true
PHY_QCOM_QMP = true
PHY_QCOM_QMP_COMBO = false
PHY_QCOM_QMP_UFS = true
PHY_QCOM_QMP_USB = false
PHY_QCOM_QMP_USB_LEGACY = false

# USB HS PHY and DWC3 gadget controller
USB_DWC3 = true
USB_DWC3_GADGET = true
USB_DWC3_QCOM = true
PHY_QCOM_QUSB2 = true

# EUD debug console
USB_QCOM_EUD = true
SERIAL_QCOM_EUD = true
SERIAL_QCOM_EUD_CONSOLE = true
SERIAL_QCOM_EUD_EARLYCON = true
