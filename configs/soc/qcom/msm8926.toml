name = "Qualcomm MSM8226/MSM8926"

[kernel]
arch = "arm"
image = "Image"

[kernel-source]
remote = "https://github.com/samcday/linux.git"
sha = "a98d1bed283a78ee1bc1e6c6b5654f7ee4e57ab8"

[kconfig]
# Platform
MMU = true
SMP = true
ARCH_MULTI_V7 = true
ARCH_QCOM = true
NR_CPUS = 4
HIGHMEM = true
CMA = true
DMA_CMA = true
CMA_SIZE_MBYTES = 64
ARM_PATCH_IDIV = true
VFP = true
NEON = true
ARM_THUMB = true
COMPAT_32BIT_TIME = true

# ARM32 boot handoff from lk2nd/aboot with a DTB at r2.
ARM_PATCH_PHYS_VIRT = true
ATAGS = true
ARM_APPENDED_DTB = true
ARM_ATAG_DTB_COMPAT = true
ARM_ATAG_DTB_COMPAT_CMDLINE_FROM_BOOTLOADER = true
AUTO_ZRELADDR = true

# TODO: arm32 Rust and kexec handoff support.
RUST = false
KEXEC_FILE = "omit"
RANDOMIZE_BASE = "omit"
RELOCATABLE = "omit"
DRM_PANIC_SCREEN_QR_CODE = "omit"
DRM_PANIC_SCREEN = { string = "user" }

# Core Qualcomm firmware/resource plumbing
PM = true
QCOM_SCM = true
QCOM_SMEM = true
QCOM_SOCINFO = true
HWSPINLOCK = true
HWSPINLOCK_QCOM = true
MAILBOX = true
QCOM_APCS_IPC = true
RPMSG_QCOM_SMD = true
QCOM_SMD_RPM = true
QCOM_CLK_SMD_RPM = true
QCOM_RPMPD = true
QCOM_SPM = true
QCOM_SMP2P = true
QCOM_SMSM = true
PM_DEVFREQ = true

# Clocks, pinctrl, GPIO and PMIC access
COMMON_CLK_QCOM = true
QCOM_A7PLL = true
QCOM_CLK_APCS_MSM8916 = true
MSM_GCC_8974 = true
MSM_MMCC_8974 = true
PINCTRL = true
GPIOLIB = true
PINCTRL_MSM = true
PINCTRL_MSM8226 = true
SPMI = true
SPMI_MSM_PMIC_ARB = true
MFD_SPMI_PMIC = true
PINCTRL_QCOM_SPMI_PMIC = true
REGULATOR = true
REGULATOR_QCOM_SMD_RPM = true
POWER_SUPPLY = true
POWER_RESET = true
POWER_RESET_MSM = true
POWER_RESET_QCOM_PON = true
THERMAL = true
QCOM_SPMI_TEMP_ALARM = true
IIO = true
QCOM_SPMI_IADC = true
QCOM_SPMI_VADC = true

# BLSP UART/I2C/SPI buses
TTY = true
SERIAL_MSM = true
SERIAL_MSM_CONSOLE = true
I2C = true
I2C_QUP = true
SPI = true
SPI_QUP = true
DMADEVICES = true
QCOM_BAM_DMA = true

# eMMC/SD storage
BLOCK = true
MMC = true
MMC_BLOCK = true
MMC_SDHCI = true
MMC_SDHCI_PLTFM = true
MMC_SDHCI_MSM = true

# USB HS controller/PHY for the configfs gadget UDC.
USB_SUPPORT = true
USB = true
USB_EHCI_HCD = true
USB_GADGET = true
USB_CHIPIDEA = true
USB_CHIPIDEA_UDC = true
USB_CHIPIDEA_HOST = true
USB_CHIPIDEA_MSM = true
GENERIC_PHY = true
PHY_QCOM_USB_HS = true
EXTCON = true
CHARGER_QCOM_SMBB = true
