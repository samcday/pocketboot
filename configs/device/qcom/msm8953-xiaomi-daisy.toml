name = "Xiaomi Mi A2 Lite (daisy)"

[kconfig]
# Buttons and touchscreen
INPUT_PM8941_PWRKEY = true
TOUCHSCREEN_EDT_FT5X06 = true

# Bitbanged sensor bus and LSM6DSL IMU
I2C_GPIO = true
IIO = true
IIO_ST_LSM6DSX = true
IIO_ST_LSM6DSX_I2C = true

# Board GPIO-controlled rails and PMIC WLED backlight
REGULATOR_FIXED_VOLTAGE = true
BACKLIGHT_CLASS_DEVICE = true
BACKLIGHT_QCOM_WLED = true

# Battery, charger and USB connector state
POWER_SUPPLY = true
EXTCON = true
BATTERY_PMI8994_FG = true
CHARGER_QCOM_SMBCHG = true

[bootimg]
header_version = 0
page_size = 2048
base = 0x80000000
kernel_offset = 0x00008000
append_dtb = true
cmdline = ""
