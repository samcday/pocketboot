name = "Samsung Galaxy A5U (EUR)"

[kconfig]
# Buttons, touchscreen and touchkeys
INPUT = true
INPUT_EVDEV = true
INPUT_KEYBOARD = true
INPUT_MISC = true
INPUT_TOUCHSCREEN = true
KEYBOARD_GPIO = true
INPUT_PM8941_PWRKEY = true
TOUCHSCREEN_MMS114 = "m"
KEYBOARD_TM2_TOUCHKEY = "m"

# Touchkey LEDs and board GPIO-controlled rails
NEW_LEDS = true
LEDS_CLASS = true
REGULATOR_FIXED_VOLTAGE = true

# Bitbanged I2C sideband buses and USB MUIC
I2C_GPIO = true
EXTCON = true
EXTCON_SM5502 = "m"

# RT5033 PMIC, charger, fuel gauge and board regulators
POWER_SUPPLY = true
MFD_RT5033 = "m"
REGULATOR_RT5033 = "m"
CHARGER_RT5033 = "m"
BATTERY_RT5033 = "m"

# Vibrator on the GCC GP2 clock PWM
PWM = true
PWM_CLK = true
INPUT_PWM_VIBRA = true

[bootmenu]
modules = [
  "mms114",
  "tm2-touchkey",
  "extcon-sm5502",
  "rt5033",
  "rt5033-regulator",
  "rt5033_charger",
  "rt5033_battery",
]

[bootimg]
header_version = 0
page_size = 2048
kernel_image = "Image"
base = 0x80000000
kernel_offset = 0x00008000
ramdisk_offset = 0x01000000
second_offset = 0x00f00000
tags_offset = 0x00000100
dtb_offset = 0x0
ramdisk_size = 1
append_seandroid_enforce = true
cmdline = ""

[bootimg.qcdt]
entries = [
    { msm_id = [206, 0], board_id = [0xce08ff01, 1] },
]
