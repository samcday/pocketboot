name = "Samsung Galaxy A5U (EUR)"

[kconfig]
# Firmware-independent MDP5/DSI display bring-up. Keep the GPU isolated while
# exercising the KMS path; the panel driver is generated in the MSM8916 tree.
DRM_SIMPLEDRM = false
IOMMU_SUPPORT = true
QCOM_IOMMU = true
DRM_MSM = true
DRM_MSM_MDP5 = true
DRM_MSM_DSI = true
DRM_MSM_DSI_28NM_PHY = true
DRM_PANEL_SAMSUNG_EA8061V_AMS497EE01 = true

# Buttons, touchscreen and touchkeys
INPUT_PM8941_PWRKEY = true
TOUCHSCREEN_MMS114 = true
KEYBOARD_TM2_TOUCHKEY = true

# Touchkey LEDs and board GPIO-controlled rails
NEW_LEDS = true
LEDS_CLASS = true
REGULATOR_FIXED_VOLTAGE = true

# Bitbanged I2C sideband buses and USB MUIC
I2C_GPIO = true
EXTCON = true
EXTCON_SM5502 = true

# RT5033 PMIC, charger, fuel gauge and board regulators
MFD_RT5033 = true
REGULATOR_RT5033 = true
CHARGER_RT5033 = true
BATTERY_RT5033 = true

# Vibrator on the GCC GP2 clock PWM
PWM = true
PWM_CLK = true
INPUT_PWM_VIBRA = true

[bootimg]
header_version = 0
page_size = 2048
kernel_image = "Image"
base = 0x80000000
kernel_offset = 0x00008000
ramdisk_offset = 0x01000000
second_offset = 0x00f00000
tags_offset = 0x00000100
dtb_offset = 0x0
ramdisk_size = 1
append_seandroid_enforce = true
cmdline = "msm.skip_gpu=1 msm.separate_gpu_kms=1"

[bootimg.qcdt]
entries = [
    { msm_id = [206, 0], board_id = [0xce08ff01, 1] },
]
