name = "Samsung Galaxy Tab A 9.7 (2015)"

[kconfig]
# Firmware-independent MDP5/DSI display bring-up. Keep the Adreno GPU isolated
# while exercising the native KMS path and the mainline S6D7AA0 panel driver.
DRM_SIMPLEDRM = false
IOMMU_SUPPORT = true
QCOM_IOMMU = true
DRM_MSM = true
DRM_MSM_MDP5 = true
DRM_MSM_DSI = true
DRM_MSM_DSI_28NM_PHY = true
BACKLIGHT_CLASS_DEVICE = true
DRM_PANEL_SAMSUNG_S6D7AA0 = true

# Buttons, Hall sensor and touchscreen
INPUT_PM8941_PWRKEY = true
TOUCHSCREEN_ATMEL_MXT = true

# Board GPIO-controlled rails
REGULATOR_FIXED_VOLTAGE = true

# PM8916 USB cable detection
EXTCON = true
EXTCON_QCOM_SPMI_MISC = true

# MAX77849-compatible fuel gauge
BATTERY_MAX17042 = true

# Vibrator on the GCC GP2 clock PWM
PWM = true
PWM_CLK = true
INPUT_PWM_VIBRA = true

[bootimg]
header_version = 0
page_size = 2048
base = 0x80000000
kernel_offset = 0x00008000
ramdisk_offset = 0x01000000
second_offset = 0x00f00000
tags_offset = 0x00000100
dtb_offset = 0x0
ramdisk_size = 1
append_seandroid_enforce = true
cmdline = "msm.skip_gpu=1 msm.separate_gpu_kms=1"

[bootimg.qcdt]
entries = [
    { msm_id = [247, 0], board_id = [0xF708FF01, 7] },
]
